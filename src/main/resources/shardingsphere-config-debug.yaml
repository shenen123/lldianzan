# 数据源配置
dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/dianzan?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: root
    password: 1234
    maximumPoolSize: 20
    minimumIdle: 5
    connectionTimeout: 30000
    idleTimeout: 60000
    maxLifetime: 1800000

# 分片规则
rules:
  - !SHARDING
    tables:
      thumb:
        actualDataNodes: ds_0.thumb_${0..127}
        tableStrategy:
          standard:
            shardingColumn: blog_id
            shardingAlgorithmName: thumb-mod-algo
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflake

    shardingAlgorithms:
      thumb-mod-algo:
        type: CLASS_BASED
        props:
          strategy: STANDARD
          algorithmClassName: com.liubinrui.config.sharding.BlogIdModShardingAlgorithm

    keyGenerators:
      snowflake:
        type: SNOWFLAKE
        props:
          worker-id: 1

  # ========== 新增：单表规则 ==========
  - !SINGLE
    tables:
      # 加载所有未配置分片规则的表（推荐，省事）
      - "*.*"
    # 执行建表语句时的默认数据源
    defaultDataSource: ds_0

# 属性配置
props:
  sql-show: true